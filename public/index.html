<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>SGC Dialing Computer</title>
  <meta name="theme-color" content="#02060f" />
  <meta name="description" content="Screen-accurate SGC Stargate dialing computer — Three.js PWA." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <style>
    :root { --bg:#02060f; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); }
    body { font-family:"Arial Narrow","Roboto Condensed",sans-serif; }

    #stage { position:fixed; inset:0; }
    canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }
    #gl  { z-index:1; }
    #hud { z-index:2; pointer-events:none; }

    /* CRT scanline + vignette overlay */
    #crt {
      position:fixed; inset:0; z-index:3; pointer-events:none; mix-blend-mode:overlay;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.05) 0px,
          rgba(255,255,255,0.05) 1px,
          rgba(0,0,0,0.10) 2px,
          rgba(0,0,0,0.10) 3px
        );
      opacity:0.5;
    }
    #vignette {
      position:fixed; inset:0; z-index:4; pointer-events:none;
      background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    }
    #hint {
      position:fixed; left:50%; bottom:14px; transform:translateX(-50%);
      z-index:6; color:#3a6a8a; font-size:12px; letter-spacing:1px; pointer-events:none;
      opacity:0.0; transition:opacity .6s; text-shadow:0 0 6px rgba(40,120,160,.6);
    }
    #hint.show { opacity:0.8; }

    /* lil-gui dark-cyan theming to match the dialer */
    .lil-gui {
      --background-color:#06121d; --widget-color:#0c2536; --hover-color:#123347;
      --focus-color:#16435e; --number-color:#7fd4ff; --string-color:#9fe8ff;
      --title-background-color:#0a2233; --text-color:#bfe6ff;
      --font-family:"Arial Narrow",monospace; --font-size:12px;
      box-shadow:0 0 24px rgba(40,140,200,.35);
    }
  </style>

  <!-- Three.js + addons + lil-gui via CDN import map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
      "lil-gui": "https://cdn.jsdelivr.net/npm/lil-gui@0.21.0/dist/lil-gui.esm.js"
    }
  }
  </script>
</head>
<body>
  <div id="stage">
    <canvas id="gl"></canvas>
    <canvas id="hud"></canvas>
  </div>
  <div id="crt"></div>
  <div id="vignette"></div>
  <div id="hint">CLICK GLYPHS TO BUILD A 7-SYMBOL ADDRESS &nbsp;·&nbsp; CLICK THE SGC EMBLEM FOR DEBUG</div>

  <script type="module" src="./src/main.js"></script>
  <script>
    // brief on-screen hint on first load
    addEventListener("load", () => {
      const h = document.getElementById("hint");
      h.classList.add("show");
      setTimeout(() => h.classList.remove("show"), 6000);
    });
  </script>
</body>
</html>
