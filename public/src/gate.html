<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>SGC Dialing Computer</title>
  <meta name="theme-color" content="#02060f" />
  <meta name="description" content="Screen-accurate SGC Stargate dialing computer — Three.js PWA." />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <style>
    :root { --bg:#02060f; }
    * { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); }
    body { font-family:"Arial Narrow","Roboto Condensed",sans-serif; }

    #stage { position:fixed; inset:0; }
    canvas { position:absolute; inset:0; width:100%; height:100%; display:block; }
    #gl  { z-index:1; }
    #hud { z-index:2; pointer-events:none; }

    /* CRT scanline + vignette overlay */
    #crt {
      position:fixed; inset:0; z-index:3; pointer-events:none; mix-blend-mode:overlay;
      background:
        repeating-linear-gradient(
          to bottom,
          rgba(255,255,255,0.05) 0px,
          rgba(255,255,255,0.05) 1px,
          rgba(0,0,0,0.10) 2px,
          rgba(0,0,0,0.10) 3px
        );
      opacity:0.5;
    }
    #vignette {
      position:fixed; inset:0; z-index:4; pointer-events:none;
      background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55) 100%);
    }
    #hint {
      position:fixed; left:50%; bottom:14px; transform:translateX(-50%);
      z-index:6; color:#3a6a8a; font-size:12px; letter-spacing:1px; pointer-events:none;
      opacity:0.0; transition:opacity .6s; text-shadow:0 0 6px rgba(40,120,160,.6);
    }
    #hint.show { opacity:0.8; }

    /* lil-gui dark-cyan theming to match the dialer */
    .lil-gui {
      --background-color:#06121d; --widget-color:#0c2536; --hover-color:#123347;
      --focus-color:#16435e; --number-color:#7fd4ff; --string-color:#9fe8ff;
      --title-background-color:#0a2233; --text-color:#bfe6ff;
      --font-family:"Arial Narrow",monospace; --font-size:12px;
      box-shadow:0 0 24px rgba(40,140,200,.35);
    }
  </style>

    }
  }
  </script>

class Screen {
  constructor(refAspect = 1.25) {
    this.refAspect = refAspect;
    this.resize();
  }
  resize(W = window.innerWidth, H = window.innerHeight) {
    this.W = W;
    this.H = H;
    this.aspect = W / H;
    if (this.aspect > this.refAspect) {
      this.rectH = H;
      this.rectW = H * this.refAspect;
    } else {
      this.rectW = W;
      this.rectH = W / this.refAspect;
    }
    this.rectX = (W - this.rectW) / 2;
    this.rectY = (H - this.rectH) / 2;
    this.unit = this.rectW;
    return this;
  }
  sx(nx) {
    return this.rectX + nx * this.rectW;
  }
  sy(ny) {
    return this.rectY + ny * this.rectH;
  }
  sr(nr) {
    return nr * this.rectW;
  }
  anchored(spec) {
    const [[x0, y0], [x1, y1]] = spec.ref;
    let X0 = this.sx(x0), X1 = this.sx(x1);
    const Y0 = this.sy(y0), Y1 = this.sy(y1);
    if (this.aspect > this.refAspect) {
      if (spec.anchorX === "left") {
        const off = this.rectX;
        X0 -= off;
        X1 -= off;
      } else if (spec.anchorX === "right") {
        const off = this.W - (this.rectX + this.rectW);
        X0 += off;
        X1 += off;
      }
    }
    return { x: X0, y: Y0, w: X1 - X0, h: Y1 - Y0 };
  }
  gate(center, rOuter) {
    const cx = this.sx(center[0]);
    const cy = this.sy(center[1]);
    let R = this.sr(rOuter);
    const maxR = Math.min(this.W, this.H) * 0.46;
    if (R > maxR)
      R = maxR;
    return { cx, cy, R };
  }
}

    if (this.phase !== Phase.KAWOOSH)
      return this.phase === Phase.ACTIVE ? 1 : 0;
    return Math.min(this.kawooshT / (this.timing.kawoosh / this.speed), 1);
  }
}

class SGCScene {

    this.camera.position.set(0, 0, 10);
    this.scene.add(new THREE3.AmbientLight(3364215, 0.8));
    const key = new THREE3.DirectionalLight(10479871, 1.4);
    key.position.set(2, 3, 4);
    this.scene.add(key);
    this.gateGroup = new THREE3.Group;
    this.scene.add(this.gateGroup);
    this.raycaster = new THREE3.Raycaster;
    this.pointer = new THREE3.Vector2;

      palette: "cyan",
      bloom: 0.9,

      tilt: 0
    };

  _setupComposer() {
    this.composer = new EffectComposer(this.renderer);
    this.composer.addPass(new RenderPass(this.scene, this.camera));
    this.bloom = new UnrealBloomPass(new THREE3.Vector2(1, 1), this.params.bloom, 0.6, 0.2);
    this.composer.addPass(this.bloom);
  }
  async load(svgUrl) {
    this.gate = await buildGate(svgUrl, { palette: this.params.palette });
    this.gateGroup.add(this.gate.group);
    this._placeGate();
    this._buildEventHorizon();
    this.logo = buildLogo(8377599);
    this.logoScene = new THREE3.Scene;
    this.logoScene.add(new THREE3.AmbientLight(2243146, 0.7));
    const lKey = new THREE3.DirectionalLight(16777215, 2);
    lKey.position.set(2, 3, 4);
    this.logoScene.add(lKey);
    const lRim = new THREE3.DirectionalLight(8377599, 1.8);
    lRim.position.set(-3, -1, 2);
    this.logoScene.add(lRim);
    const lFill = new THREE3.PointLight(12578815, 1.2, 0);
    lFill.position.set(0, 0, 3);
    this.logoScene.add(lFill);
    this.logoScene.add(this.logo);
    this.logoCam = new THREE3.PerspectiveCamera(38, 1, 0.1, 10);
    this.logoCam.position.set(0, 0, 2.6);
    this.dialer = new Dialer(this.gate, {
      onChevronLock: (i, glyph) => this.hooks.onChevronLock?.(i, glyph),
      onPhase: (p) => this.hooks.onPhase?.(p),
      onKawoosh: () => this.hooks.onKawoosh?.(),
      onReset: () => this.hooks.onReset?.()
    });
    this.dialer.timing && (this.dialer.speed = this.params.speed);
    return this;
  }
  _buildEventHorizon() {
    const geo = new THREE3.CircleGeometry(1, 64);
    this.ehUniforms = {
      uTime: { value: 0 },
      uProgress: { value: 0 },
      uColor: { value: new THREE3.Color(7325951) },
      uKawoosh: { value: 0 }
    };
    const mat = new THREE3.ShaderMaterial({
      transparent: true,
      uniforms: this.ehUniforms,
      vertexShader: `
        varying vec2 vUv;
        void main(){ vUv=uv; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }
      `,
      fragmentShader: `
        varying vec2 vUv;
        uniform float uTime, uProgress, uKawoosh;
        uniform vec3 uColor;
        // cheap value noise
        float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
        float noise(vec2 p){
          vec2 i=floor(p), f=fract(p);
          float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1));
          vec2 u=f*f*(3.0-2.0*f);
          return mix(a,b,u.x)+(c-a)*u.y*(1.0-u.x)+(d-b)*u.x*u.y;
        }
        void main(){
          vec2 p = vUv*2.0-1.0;
          float r = length(p);
          if(r>1.0){ discard; }
          float ang = atan(p.y,p.x);
          float ripple = noise(vec2(r*6.0 - uTime*0.8, ang*2.0));
          float ripple2 = noise(vec2(r*12.0 + uTime*1.2, ang*3.0));
          float surf = 0.5 + 0.5*ripple*ripple2;
          // kawoosh: bright bulge from center
          float k = smoothstep(uKawoosh-0.2, uKawoosh, 1.0-r) * (uKawoosh>0.0?1.0:0.0);
          vec3 col = uColor * (0.35 + 0.75*surf);
          col += vec3(0.7,0.9,1.0) * k * 1.6;
          float edge = smoothstep(1.0, 0.85, r);
          float a = uProgress * (0.55 + 0.45*surf) * edge + k;
          gl_FragColor = vec4(col, a);
        }
      `
    });
    this.eventHorizon = new THREE3.Mesh(geo, mat);
    this.eventHorizon.position.z = -0.05;
    this.gateGroup.add(this.eventHorizon);
  }
  _placeGate() {
    if (!this.gate)
      return;
    const g = this.S.gate(this._gateCenter || [0.464, 0.4775], this._gateR || 0.218);
    this.gate.group.scale.set(g.R, -g.R, g.R);
    this.gateGroup.position.set(g.cx, g.cy, 0);
    if (this.eventHorizon)
      this.eventHorizon.scale.set(g.R * 0.66, g.R * 0.66, 1);
  }
  setGateTarget(center, rOuter) {
    this._gateCenter = center;
    this._gateR = rOuter;
    this._placeGate();
  }
  setPointer(clientX, clientY) {
    const r = this.glCanvas.getBoundingClientRect();
    this.pointer.x = (clientX - r.left) / r.width * 2 - 1;
    this.pointer.y = -((clientY - r.top) / r.height) * 2 + 1;
  }
  pickGlyph(clientX, clientY) {
    this.setPointer(clientX, clientY);
    this.raycaster.setFromCamera(this.pointer, this.camera);
    const meshes = [];
    for (const g of this.gate.glyphMeshes)
      g.traverse((o) => {
        if (o.isMesh) {
          o.userData._glyph = g;
          meshes.push(o);
        }
      });
    const hits = this.raycaster.intersectObjects(meshes, false);
    if (hits.length)
      return hits[0].object.userData._glyph.userData.index;
    return -1;
  }
  setPalette(p) {
    this.params.palette = p;
    this.gate.setPalette(p);
    const hex = p === "red" ? 16734788 : 8377599;
    this.logo.userData.setColor(hex);
    this.ehUniforms.uColor.value.setHex(p === "red" ? 16738901 : 7325951);
  }
  resize() {
    const { innerWidth: w, innerHeight: h } = window;
    this.renderer.setSize(w, h, false);
    this.composer.setSize(w, h);
    this.S.resize(w, h);
    this.camera.left = 0;
    this.camera.right = w;
    this.camera.top = 0;
    this.camera.bottom = h;
    this.camera.updateProjectionMatrix();
    this._placeGate();
  }
  update(dt) {
    this.dialer.speed = this.params.speed;
    this.dialer.update(dt);
    if (this.gate.updateGlyphAnims)
      this.gate.updateGlyphAnims(dt, this.gate.palette);
    if (this.gate.updateHeroGlyph)
      this.gate.updateHeroGlyph(dt);
    if (this.logo) {
      this.logo.rotation.y += dt * this.params.logoSpin * Math.PI;
      this.logo.rotation.x = Math.sin(this.logo.rotation.y * 0.5) * 0.18;
    }
    const p = this.dialer.phase;
    const active = p === Phase.ACTIVE;
    const kaw = this.dialer.kawooshProgress();
    this.ehUniforms.uTime.value += dt;
    this.ehUniforms.uProgress.value += ((active || p === Phase.KAWOOSH ? 1 : 0) - this.ehUniforms.uProgress.value) * Math.min(1, dt * 3);
    this.ehUniforms.uKawoosh.value = p === Phase.KAWOOSH ? kaw : active ? 0 : 0;
    this.bloom.strength = this.params.bloom;
  }
  render() {
    this.composer.render();
    this._renderLogoCorner();
  }
  _logoBayPx() {
    const S = this.S;
    const ref = this._logoBayRef || [[0.02, 0.025], [0.132, 0.09]];
    const r = S.anchored({ ref, anchorX: "left" });
    const pad = Math.min(r.w, r.h) * 0.16;
    return { x: r.x + 6 + pad, y: r.y + pad, w: r.w - pad * 2, h: r.h - pad * 2 };
  }
  _renderLogoCorner() {
    if (!this.logo)
      return;
    const r = this.renderer;
    const { innerHeight: H, innerWidth: W } = window;
    const b = this._logoBayPx();
    const vx = b.x, vy = H - (b.y + b.h), vw = b.w, vh = b.h;
    if (vw <= 0 || vh <= 0)
      return;
    r.setRenderTarget(null);
    r.autoClear = false;
    r.setScissorTest(true);
    r.setViewport(vx, vy, vw, vh);
    r.setScissor(vx, vy, vw, vh);
    r.clearDepth();
    this.logoCam.aspect = vw / vh;
    this.logoCam.updateProjectionMatrix();
    r.render(this.logoScene, this.logoCam);
    r.setScissorTest(false);
    r.setViewport(0, 0, W, H);
    r.autoClear = true;
  }
  isLogoClick(clientX, clientY) {
    const b = this._logoBayPx();
    return clientX >= b.x - 8 && clientX <= b.x + b.w + 8 && clientY >= b.y - 8 && clientY <= b.y + b.h + 8;
  }
  resultGlyphPaths(glyphsModule) {
    const out = [];
    for (let i = 0;i < this.dialer.lockedCount; i++) {
      const gi = this.dialer.address[i];
      const name = glyphsModule.GLYPH_ORDER[gi];
      out[i] = glyphsModule.GLYPHS[name].paths;
    }
    return out;
  }
}

// public/src/hud.js
class HUD {
  constructor(canvas, layout, screen) {
    this.canvas = canvas;
    this.ctx = canvas.getContext("2d");
    this.L = layout;
    this.S = screen;
    this.dpr = Math.min(window.devicePixelRatio || 1, 2);
    this.locked = 0;
    this.address = [];
    this.resultGlyphPaths = [];
    this.palette = "cyan";
    this.binaryRows = this._genBinary(18);
    this.binaryOffset = 0;
    this.t = 0;
    this.showLayers = {
      header: true,
      binary: true,
      checklist: true,
      footer: true,
      boxes: true,
      circuit: true
    };
    this.colors = {
      cyan: {
        line: "#1d8fcf",
        lineDim: "#0e466a",
        glow: "#7fd4ff",
        text: "#9fdcff",
        textDim: "#3a6a8a",
        lit: "#cdeaff",
        binary: "#1aa39c",
        binaryHi: "#7ff0e8"
      },
      red: {
        line: "#cf3a2a",
        lineDim: "#6a201a",
        glow: "#ff9f92",
        text: "#ffb0a4",
        textDim: "#8a3a30",
        lit: "#ffd8d2",
        binary: "#cf5a4a",
        binaryHi: "#ff9a88"
      }
    };
    this.resize();
    window.addEventListener("resize", () => this.resize());
  }
  setPalette(p) {
    this.palette = p;
  }
  C() {
    return this.colors[this.palette] || this.colors.cyan;
  }
  static CHEVRON_DEG = [50, 10, 330, 290, 250, 210, 90];
  _genBinary(rows) {
    const out = [];
    for (let r = 0;r < rows; r++) {
      let s = "";
      for (let c = 0;c < 11; c++)
        s += Math.random() < 0.5 ? "0" : "1";
      out.push(s);
    }
    return out;
  }
  resize() {
    const { innerWidth: W, innerHeight: H } = window;
    this.W = W;
    this.H = H;
    this.canvas.width = Math.round(W * this.dpr);
    this.canvas.height = Math.round(H * this.dpr);
    this.canvas.style.width = W + "px";
    this.canvas.style.height = H + "px";
    this.ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);
  }
  update(dt, state) {
    this.t += dt;
    if (state) {
      this.address = state.address ?? this.address;
      this.locked = state.locked ?? this.locked;
      this.palette = state.palette ?? this.palette;
      this.resultGlyphPaths = state.resultGlyphPaths ?? this.resultGlyphPaths;
      this._binarySpeed = state.binarySpeed ?? 1;
      this.phase = state.phase ?? this.phase;
      this.mode = state.mode ?? this.mode;
      this.remainingMs = state.remainingMs ?? this.remainingMs;
      this.addressName = state.addressName ?? this.addressName;
    }
    this.binaryOffset += dt * (this._binarySpeed ?? 1) * 14;
    const rowH = this._lastRowH || 18;
    if (this.binaryOffset > rowH) {
      this.binaryOffset -= rowH;
      this.binaryRows.push(this._genBinary(1)[0]);
      this.binaryRows.shift();
    }
  }
  fpx(refFrac) {
    return Math.max(8, this.S.rectH * refFrac);
  }
  draw() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, this.W, this.H);
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    if (this.showLayers.circuit)
      this._drawCircuit();
    if (this.showLayers.header)
      this._drawHeader();
    if (this.showLayers.binary)
      this._drawBinary();
    if (this.showLayers.checklist)
      this._drawChecklist();
    if (this.showLayers.boxes)
      this._drawBoxes();
    if (this.showLayers.footer)
      this._drawFooter();
  }
  isActivated() {
    return this._activated === true;
  }
  setActivated(v) {
    this._activated = v;
  }
  _drawHeader() {
    const ctx = this.ctx, C = this.C(), S = this.S;
    const lb = S.anchored({ ref: this.L.logo_bay.rect, anchorX: "left" });
    const tbx = lb.x + lb.w + 12;
    this._stroke(C.line, 1.4, 4);
    this._rr(tbx, S.sy(0.022), this.W - 6 - tbx - 6, S.sy(0.09) - S.sy(0.022), 6);
    ctx.stroke();
    ctx.shadowBlur = 0;
    this._stroke(C.line, 1.4, 6);
    this._rr(lb.x + 6, lb.y, lb.w, lb.h, 5);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = C.line;
    for (let i = 0;i < 14; i++) {
      const dx = tbx + 60 + i % 7 * 14;
      const dy = S.sy(0.04) + Math.floor(i / 7) * 8;
      if (this._dots?.[i]) {
        ctx.globalAlpha = this._dots[i];
        ctx.fillRect(dx, dy, 4, 4);
      }
    }
    ctx.globalAlpha = 1;
    ctx.fillStyle = C.text;
    ctx.font = `bold ${this.fpx(0.022)}px "Arial Narrow", sans-serif`;
    ctx.textBaseline = "alphabetic";
    const dest = S.anchored({ ref: [[this.L.destination.pos[0], 0], [0.978, 0]], anchorX: "right" });
    ctx.fillText("DESTINATION:", dest.x, S.sy(this.L.destination.pos[1]));
    if (this.addressName) {
      ctx.fillStyle = C.glow;
      ctx.font = `bold ${this.fpx(0.024)}px "Courier New", monospace`;
      const tw = ctx.measureText("DESTINATION:").width;
      ctx.fillText(this.addressName.toUpperCase(), dest.x + tw + 14, S.sy(this.L.destination.pos[1]));
    }
  }
  _drawCircuit() {
    const ctx = this.ctx, C = this.C(), S = this.S;
    const rects = this._resultRects();
    const activated = this.isActivated();
    const cc = this.L.circuit;
    if (!cc)
      return;
    const railCol = activated ? "#ff3a24" : C.line;
    const railPts = cc.top_rail.map((p, idx) => {
      const anchorX = idx >= 2 ? "right" : "left";
      const a = S.anchored({ ref: [[p[0], p[1]], [p[0], p[1]]], anchorX });
      return { x: a.x, y: a.y };
    });
    this._stroke(railCol, activated ? 2 : 1.5, activated ? 6 : 0);
    ctx.beginPath();
    railPts.forEach((p, i) => i ? ctx.lineTo(p.x, p.y) : ctx.moveTo(p.x, p.y));
    ctx.stroke();
    const corner = railPts[railPts.length - 1];
    if (cc.chevron_link) {
      const a = S.anchored({ ref: [cc.chevron_link.from, cc.chevron_link.from], anchorX: "left" });
      const tx = S.sx(cc.chevron_link.to[0]), ty = S.sy(cc.chevron_link.to[1]);
      this._stroke(railCol, activated ? 2 : 1.5, activated ? 6 : 0);
      ctx.beginPath();
      ctx.moveTo(a.x, a.y);
      ctx.lineTo(tx, ty);
      ctx.stroke();
    }
    rects.forEach((r, i) => {
      const hot = activated || i < this.locked;
      const my = r.y + r.h / 2;
      const boxRight = r.x + r.w;
      const laneRef = cc.lane_x?.[i] ?? 0.985;
      const lane = S.anchored({ ref: [[laneRef, 0], [laneRef, 0]], anchorX: "right" }).x;
      this._stroke(hot ? "#ff3a24" : C.lineDim, hot ? 1.5 : 1, hot ? 5 : 0);
      ctx.beginPath();
      ctx.moveTo(corner.x, corner.y);
      ctx.lineTo(lane, corner.y);
      ctx.lineTo(lane, my);
      ctx.lineTo(boxRight, my);
      ctx.stroke();
    });
    ctx.shadowBlur = 0;
  }
  _stroke(color, w = 1.2, glow = 0) {
    const ctx = this.ctx;
    ctx.strokeStyle = color;
    ctx.lineWidth = w;
    ctx.shadowColor = glow ? color : "transparent";
    ctx.shadowBlur = glow;
  }
  _rr(x, y, w, h, r) {
    const ctx = this.ctx;
    r = Math.min(r, Math.abs(w) / 2, Math.abs(h) / 2);
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }
  _drawBinary() {
    const ctx = this.ctx, C = this.C(), S = this.S;
    const r = S.anchored({ ref: this.L.binary.rect, anchorX: "left" });
    const x0 = r.x + 6, y0 = r.y, w = r.w, h = r.h;
    this._stroke(C.line, 1.2, 3);
    this._rr(x0 - 4, y0 - 6, w + 8, h + 12, 6);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.save();
    ctx.beginPath();
    ctx.rect(x0, y0, w, h);
    ctx.clip();
    const rowH = h / 15;
    this._lastRowH = rowH;
    const fs = rowH * 0.82;
    ctx.font = `${fs}px "Courier New", monospace`;
    ctx.textBaseline = "top";
    for (let i = 0;i < this.binaryRows.length; i++) {
      const ry = y0 + i * rowH - this.binaryOffset;
      const hot = (i + Math.floor(this.t)) % 7 === 0;
      ctx.fillStyle = hot ? C.binaryHi : C.binary;
      ctx.globalAlpha = 0.5 + 0.5 * Math.abs(Math.sin((i + this.t) * 0.6));
      ctx.fillText(this.binaryRows[i].split("").join(" "), x0 + 6, ry);
    }
    ctx.globalAlpha = 1;
    ctx.restore();
  }
  statusText() {
    const m = this.mode === "incoming" ? "INCOMING" : "OUTGOING";
    switch (this.phase) {
      case "idle":
        return "STATUS: STANDBY";
      case "spinning":
      case "locking":
      case "between":
        return `STATUS: ${m} DIALING SEQUENCE`;
      case "dialed":
        return "STATUS: CHEVRONS ENCODED";
      case "kawoosh":
        return "STATUS: WORMHOLE ESTABLISHED";
      case "active":
        return `STATUS: ${m} WORMHOLE ACTIVE`;
      case "aborting":
        return "STATUS: DIALING ABORTED";
      default:
        return "STATUS: ACTIVE";
    }
  }
  _drawChecklist() {
    const ctx = this.ctx, C = this.C(), S = this.S;
    const sp = this.L.status.pos;
    ctx.fillStyle = C.text;
    ctx.font = `bold ${this.fpx(0.018)}px "Arial Narrow", sans-serif`;
    ctx.textBaseline = "alphabetic";
    const statusX = S.anchored({ ref: [[0.028, 0], [0.15, 0]], anchorX: "left" }).x + 6;
    ctx.fillText(this.statusText(), statusX, S.sy(sp[1]));
    const r = S.anchored({ ref: this.L.checklist.rect, anchorX: "left" });
    const x0 = r.x + 6, y0 = r.y, w = r.w, h = r.h;
    this._stroke(C.line, 1.2, 2);
    this._rr(x0 - 2, y0 - 2, w + 4, h + 4, 5);
    ctx.stroke();
    ctx.shadowBlur = 0;
    const rows = 7, rh = h / rows;
    ctx.font = `${Math.max(9, rh * 0.5)}px "Arial Narrow", sans-serif`;
    for (let i = 0;i < rows; i++) {
      const ry = y0 + i * rh, cw = rh * 0.62, lit = i < this.locked;
      this._stroke(lit ? C.glow : C.lineDim, 1.1, lit ? 6 : 0);
      ctx.strokeRect(x0 + 6, ry + rh * 0.2, cw, rh * 0.55);
      if (lit) {
        ctx.fillStyle = C.glow;
        ctx.fillRect(x0 + 6, ry + rh * 0.2, cw, rh * 0.55);
      }
      ctx.shadowBlur = 0;
      ctx.fillStyle = lit ? C.lit : C.textDim;
      ctx.fillText(`${i + 1}`, x0 + cw + 16, ry + rh * 0.68);
      if (lit)
        ctx.fillText("OK", x0 + cw + 34, ry + rh * 0.68);
    }
  }
  _resultRects() {
    const S = this.S;
    return this.L.result_boxes.map((ref) => S.anchored({ ref, anchorX: "right" }));
  }
  _drawBoxes() {
    const ctx = this.ctx, C = this.C();
    const rects = this._resultRects();
    const activated = this.isActivated();
    rects.forEach((r, i) => {
      const lit = i < this.locked;
      const hot = activated || lit;
      const my = r.y + r.h / 2;
      this._stroke(hot ? "#ff3a24" : C.line, 1.4, hot ? 6 : 2);
      this._rr(r.x, r.y, r.w, r.h, 4);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.fillStyle = lit ? C.lit : C.textDim;
      ctx.font = `bold ${this.fpx(0.032)}px "Arial Narrow", sans-serif`;
      ctx.textBaseline = "middle";
      ctx.fillText(`${i + 1}`, r.x - 28, my);
      ctx.textBaseline = "alphabetic";
      if (lit && this.resultGlyphPaths[i]) {
        this._glyphInBox(this.resultGlyphPaths[i], r, activated ? "#ff8a7a" : C.lit);
      }
    });
  }
  _glyphInBox(paths, r, color) {
    const ctx = this.ctx;
    const pad = Math.min(r.w, r.h) * 0.18;
    const size = Math.min(r.w, r.h) - pad * 2;
    const ox = r.x + (r.w - size) / 2, oy = r.y + (r.h - size) / 2;
    ctx.save();
    ctx.translate(ox, oy);
    ctx.scale(size / 100, size / 100);
    ctx.strokeStyle = color;
    ctx.lineWidth = 6;
    ctx.lineJoin = "round";
    ctx.lineCap = "round";
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    for (const d of paths)
      ctx.stroke(new Path2D(d));
    ctx.restore();
    ctx.shadowBlur = 0;
  }
  _drawFooter() {
    const ctx = this.ctx, C = this.C(), S = this.S;
    ctx.textBaseline = "alphabetic";
    ctx.font = `${this.fpx(0.016)}px "Arial Narrow", sans-serif`;
    ctx.fillStyle = C.textDim;
    ctx.fillText("LST CODE #1", S.sx(this.L.lst1.pos[0]), S.sy(this.L.lst1.pos[1]));
    ctx.fillText("LST CODE #2", S.sx(this.L.lst2.pos[0]), S.sy(this.L.lst2.pos[1]));
    const br = this.L.bottom_readout.rect;
    this._stroke(C.line, 1.2, 2);
    this._rr(S.sx(br[0][0]), S.sy(br[0][1]), S.sx(br[1][0]) - S.sx(br[0][0]), S.sy(br[1][1]) - S.sy(br[0][1]), 4);
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = C.textDim;
    ctx.font = `${this.fpx(0.016)}px "Arial Narrow", sans-serif`;
    ctx.fillText("AUTHORIZATION CODE:", S.sx(this.L.auth_label.pos[0]), S.sy(this.L.auth_label.pos[1]));
    ctx.fillStyle = C.glow;
    ctx.font = `bold ${this.fpx(0.026)}px "Courier New", monospace`;
    ctx.fillText("7 7 8 9 2 7  -  5 7 8 9 2 3 8 7", S.sx(this.L.auth_value.pos[0]), S.sy(this.L.auth_value.pos[1]));
    ctx.fillStyle = C.textDim;
    ctx.font = `${this.fpx(0.016)}px "Arial Narrow", sans-serif`;
    const sys = S.anchored({ ref: [[this.L.sys.pos[0], 0], [0.95, 0]], anchorX: "right" });
    ctx.fillText("SYS: NOMINAL", sys.x, S.sy(this.L.sys.pos[1]));
    if (this.phase === "active" && this.remainingMs != null) {
      const ms = Math.max(0, this.remainingMs);
      const mm = Math.floor(ms / 60000);
      const ss = Math.floor(ms % 60000 / 1000);
      const mmm = Math.floor(ms % 1000);
      const txt = `${String(mm).padStart(2, "0")}:${String(ss).padStart(2, "0")}.${String(mmm).padStart(3, "0")}`;
      const danger = ms < 60000;
      const lbl = S.anchored({ ref: [[0.4, 0], [0.62, 0]], anchorX: "right" });
      ctx.fillStyle = danger ? "#ff6a55" : C.textDim;
      ctx.font = `${this.fpx(0.015)}px "Arial Narrow", sans-serif`;
      ctx.fillText("WORMHOLE T-MINUS", lbl.x, S.sy(0.945));
      ctx.fillStyle = danger && Math.floor(this.t * 4) % 2 ? "#ff3a24" : C.glow;
      ctx.font = `bold ${this.fpx(0.03)}px "Courier New", monospace`;
      ctx.fillText(txt, lbl.x, S.sy(0.978));
    }
  }
}

function buildDebug(scene, hud, glyphsModule) {
  const gui = new GUI({ title: "SGC // DEBUG", width: 300 });
  gui.domElement.style.position = "fixed";
  gui.domElement.style.top = "96px";
  gui.domElement.style.left = "12px";
  gui.domElement.style.zIndex = "50";
  gui.domElement.style.maxHeight = "calc(100vh - 120px)";
  gui.domElement.style.overflowY = "auto";
  gui.hide();
  let visible = false;
  const dialer = scene.dialer;
  const ctl = { closePanel: () => toggle() };
  gui.add(ctl, "closePanel").name("✕ Close debug (or click logo)");
  const state = {
    address: "Abydos",
    manual: GLYPH_ORDER[0],
    mode: "outgoing",
    dial: () => doDial(),
    abort: () => dialer.abort(),
    reset: () => dialer.reset(),
    skipToLocked: () => skipToLocked(),
    clearAddress: () => {
      dialer.reset();
    },
    shutdown: () => dialer.shutdown?.(),
    ffTimer: () => {
      if (dialer.phase === "active")
        dialer.gateOpenMs += 60000;
    },
    jumpTo37: () => {
      if (dialer.phase === "active")
        dialer.gateOpenMs = 37 * 60000;
    }
  };
  const fDial = gui.addFolder("Dialing");
  fDial.add(state, "address", ADDRESSES.map((a) => a.name)).name("Known address").onChange(() => loadAddress());
  fDial.add(state, "mode", ["outgoing", "incoming"]).name("Mode").onChange((v) => {
    dialer.mode = v;
  });
  fDial.add(state, "dial").name("▶ Dial");
  fDial.add(state, "abort").name("✕ Abort");
  fDial.add(state, "reset").name("↺ Reset to idle");
  fDial.add(state, "skipToLocked").name("⏩ Skip to locked");
  fDial.add(state, "shutdown").name("⏻ Shutdown wormhole");
  fDial.add(state, "ffTimer").name("⏱ +1 min (timer)");
  fDial.add(state, "jumpTo37").name("⏱ Jump to 37:00");
  const fManual = fDial.addFolder("Manual builder");
  const slotState = { current: 0 };
  for (let s = 0;s < 7; s++) {
    slotState["g" + s] = GLYPH_ORDER[s === 6 ? 0 : s + 1];
    fManual.add(slotState, "g" + s, GLYPH_ORDER).name(`glyph ${s + 1}`);
  }
  fManual.add({ apply: () => {
    const arr = [];
    for (let s = 0;s < 7; s++)
      arr.push(GLYPH_ORDER.indexOf(slotState["g" + s]));
    dialer.setAddress(arr);
  } }, "apply").name("Apply manual address");
  const fAnim = gui.addFolder("Animation");
  fAnim.add(scene.params, "speed", 0.25, 8, 0.05).name("Speed ×");
  fAnim.add({ fast: false }, "fast").name("Fast preset").onChange((v) => {
    scene.params.speed = v ? 5 : 1;
    gui.controllersRecursive().forEach((c) => c.updateDisplay());
  });
  fAnim.add(dialer.timing, "spinPerGlyph", 0.4, 3, 0.05).name("Spin/glyph (s)");
  fAnim.add(dialer.timing, "lockDwell", 0.1, 1.2, 0.05).name("Lock dwell (s)");
  fAnim.add(dialer.timing, "kawoosh", 0.4, 3, 0.05).name("Kawoosh (s)");
  const fSet = gui.addFolder("Settings");
  fSet.add(scene.params, "palette", ["cyan", "red"]).name("Palette").onChange((p) => {
    scene.setPalette(p);
    hud.setPalette(p);
  });
  fSet.add(scene.params, "bloom", 0, 2.5, 0.05).name("Bloom");
  fSet.add(scene.params, "logoSpin", 0, 2, 0.05).name("Logo spin");
  fSet.add(scene.params, "binarySpeed", 0, 4, 0.1).name("Binary speed");
  const soundParams = { enabled: true, volume: 0.5 };
  fSet.add(soundParams, "enabled").name("Sound").onChange((v) => scene.sound?.setEnabled(v));
  fSet.add(soundParams, "volume", 0, 1, 0.05).name("Volume").onChange((v) => scene.sound?.setVolume(v));
  const fLayers = gui.addFolder("HUD layers");
  for (const k of Object.keys(hud.showLayers)) {
    fLayers.add(hud.showLayers, k).name(k);
  }
  const fGate = gui.addFolder("Gate layers");
  const gateLayerKeys = [
    "Main_gate_parts",
    "Inner_Chevron_Delimiters",
    "Outer_Chevron_Delimiters",
    "Alternative_Detailing",
    "Chevron_Locks",
    "Symbols"
  ];
  const gateVis = {};
  for (const k of gateLayerKeys) {
    gateVis[k] = true;
    fGate.add(gateVis, k).name(k.replace(/_/g, " ")).onChange((v) => {
      const obj = scene.gate.layers[k];
      if (obj)
        obj.visible = v;
    });
  }
  const fDbg = gui.addFolder("Debug");
  const stats = { fps: 0, phase: "idle", locked: 0, addressLen: 0 };
  fDbg.add(stats, "fps").name("FPS").listen().disable();
  fDbg.add(stats, "phase").name("Phase").listen().disable();
  fDbg.add(stats, "locked").name("Chevrons").listen().disable();
  fDbg.add(stats, "addressLen").name("Address len").listen().disable();
  fDbg.add({ wireframe: false }, "wireframe").name("Glyph wireframe").onChange((v) => {
    for (const m of scene.gate.glyphMeshes)
      m.traverse((o) => {
        if (o.isMesh)
          o.material.wireframe = v;
      });
  });
  fDbg.add({ freeze: false }, "freeze").name("Freeze anim").onChange((v) => {
    scene._frozen = v;
  });
  function loadAddress() {
    const a = ADDRESSES.find((x) => x.name === state.address);
    if (a) {
      dialer.setAddress(a.glyphs.slice());
      dialer.addressName = a.name;
    }
  }
  function doDial() {
    if (dialer.address.length < 7)
      loadAddress();
    dialer.dial();
  }
  function skipToLocked() {
    if (dialer.address.length < 7)
      loadAddress();
    dialer.lockedCount = 7;
    for (let i = 0;i < 7; i++) {
      const gi = dialer.address[i];
      const mesh = scene.gate.glyphMeshes[gi];
      if (mesh) {
        mesh.userData.lit = true;
        mesh.userData.mat.color.setHex(scene.gate.palette.glyphLit);
      }
    }
    dialer.phase = "active";
  }
  function toggle() {
    visible = !visible;
    visible ? gui.show() : gui.hide();
  }
  function isOpen() {
    return visible;
  }
  gui.domElement.addEventListener("pointerdown", (e) => e.stopPropagation());
  gui.domElement.addEventListener("click", (e) => e.stopPropagation());
  function tickStats(fps) {
    stats.fps = Math.round(fps);
    stats.phase = dialer.phase;
    stats.locked = dialer.lockedCount;
    stats.addressLen = dialer.address.length;
  }
  if (new URLSearchParams(location.search).has("debug"))
    toggle();
  return { gui, toggle, isOpen, tickStats, loadAddress };
}

// public/src/sound.js
class Sound {
  constructor() {
    this.ctx = null;
    this.enabled = true;
    this.master = null;
    this._spinNode = null;
  }
  unlock() {
    if (this.ctx) {
      if (this.ctx.state === "suspended")
        this.ctx.resume();
      return;
    }
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) {
      this.enabled = false;
      return;
    }
    this.ctx = new AC;
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.5;
    this.master.connect(this.ctx.destination);
  }
  setEnabled(v) {
    this.enabled = v;
    if (!v)
      this.stopSpin();
  }
  setVolume(v) {
    if (this.master)
      this.master.gain.value = v;
  }
  _now() {
    return this.ctx ? this.ctx.currentTime : 0;
  }
  play(name) {
    if (!this.enabled || !this.ctx)
      return;
    switch (name) {
      case "lock":
        return this._lock();
      case "kawoosh":
        return this._kawoosh();
      case "dial":
        return this._dial();
      case "abort":
        return this._abort();
      default:
        return;
    }
  }
  _lock() {
    const t = this._now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "square";
    o.frequency.setValueAtTime(140, t);
    o.frequency.exponentialRampToValueAtTime(48, t + 0.16);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.5, t + 0.012);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    o.connect(g).connect(this.master);
    o.start(t);
    o.stop(t + 0.24);
    const nb = this._noiseBuffer(0.12);
    const ns = this.ctx.createBufferSource();
    ns.buffer = nb;
    const nf = this.ctx.createBiquadFilter();
    nf.type = "bandpass";
    nf.frequency.value = 2200;
    nf.Q.value = 0.8;
    const ng = this.ctx.createGain();
    ng.gain.setValueAtTime(0.4, t);
    ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
    ns.connect(nf).connect(ng).connect(this.master);
    ns.start(t);
    ns.stop(t + 0.12);
  }
  _kawoosh() {
    const t = this._now();
    const nb = this._noiseBuffer(1.4);
    const ns = this.ctx.createBufferSource();
    ns.buffer = nb;
    const lp = this.ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.setValueAtTime(300, t);
    lp.frequency.exponentialRampToValueAtTime(4500, t + 0.5);
    lp.frequency.exponentialRampToValueAtTime(600, t + 1.3);
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.7, t + 0.5);
    g.gain.exponentialRampToValueAtTime(0.2, t + 0.9);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 1.4);
    ns.connect(lp).connect(g).connect(this.master);
    ns.start(t);
    ns.stop(t + 1.4);
    const o = this.ctx.createOscillator();
    const og = this.ctx.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(80, t);
    o.frequency.exponentialRampToValueAtTime(40, t + 0.8);
    og.gain.setValueAtTime(0.0001, t + 0.4);
    og.gain.exponentialRampToValueAtTime(0.5, t + 0.6);
    og.gain.exponentialRampToValueAtTime(0.0001, t + 1.2);
    o.connect(og).connect(this.master);
    o.start(t);
    o.stop(t + 1.2);
  }
  _dial() {
    const t = this._now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "sine";
    o.frequency.setValueAtTime(660, t);
    o.frequency.setValueAtTime(880, t + 0.08);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.3, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
    o.connect(g).connect(this.master);
    o.start(t);
    o.stop(t + 0.2);
  }
  _abort() {
    const t = this._now();
    const o = this.ctx.createOscillator();
    const g = this.ctx.createGain();
    o.type = "sawtooth";
    o.frequency.setValueAtTime(400, t);
    o.frequency.exponentialRampToValueAtTime(120, t + 0.3);
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
    o.connect(g).connect(this.master);
    o.start(t);
    o.stop(t + 0.32);
  }
  startSpin() {
    if (!this.enabled || !this.ctx || this._spinNode)
      return;
    const t = this._now();
    const nb = this._noiseBuffer(2, true);
    const ns = this.ctx.createBufferSource();
    ns.buffer = nb;
    ns.loop = true;
    const lp = this.ctx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.value = 220;
    const g = this.ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.3);
    ns.connect(lp).connect(g).connect(this.master);
    ns.start(t);
    this._spinNode = { ns, g };
  }
  stopSpin() {
    if (!this._spinNode)
      return;
    const { ns, g } = this._spinNode;
    const t = this._now();
    try {
      g.gain.cancelScheduledValues(t);
      g.gain.setValueAtTime(g.gain.value, t);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
      ns.stop(t + 0.25);
    } catch {}
    this._spinNode = null;
  }
  _noiseBuffer(seconds, loopable = false) {
    const len = Math.floor(this.ctx.sampleRate * seconds);
    const buf = this.ctx.createBuffer(1, len, this.ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0;i < len; i++)
      data[i] = Math.random() * 2 - 1;
    return buf;
  }
}

// public/src/main.js
var glCanvas = document.getElementById("gl");
var hudCanvas = document.getElementById("hud");
var layout = globalThis.__SGC_LAYOUT__ ?? await (await fetch(new URL("./layout.json", import.meta.url))).json();
var screen = new Screen(layout.ref_aspect ?? 1.25);
var scene = new SGCScene(glCanvas, screen);
var gateSrc = globalThis.__SGC_GATE_SVG__ ?? new URL("../assets/gate.svg", import.meta.url).href;
await scene.load(gateSrc);
scene.setGateTarget(layout.gate.center, layout.gate.R_outer);
scene._logoBayRef = layout.logo_bay.rect;
var hud = new HUD(hudCanvas, layout, screen);
var debug = buildDebug(scene, hud, exports_glyphs);
var sound = new Sound;
scene.dialer.sound = (name) => sound.play(name);
scene.sound = sound;
var unlockAudio = () => {
  sound.unlock();
  window.removeEventListener("pointerdown", unlockAudio);
  window.removeEventListener("keydown", unlockAudio);
};
window.addEventListener("pointerdown", unlockAudio);
window.addEventListener("keydown", unlockAudio);
window.addEventListener("resize", () => {
  screen.resize();
  scene._placeGate();
});
scene.hooks.onChevronLock = () => {};
scene.hooks.onPhase = () => {};
scene.hooks.onKawoosh = () => {
  sound.play("kawoosh");
};
scene.hooks.onReset = () => {};
var hoverGlyph = -1;
window.addEventListener("pointermove", (e) => {
  if (scene.dialer.phase === Phase.IDLE) {
    hoverGlyph = scene.pickGlyph(e.clientX, e.clientY);
    glCanvas.style.cursor = hoverGlyph >= 0 ? "pointer" : "default";
    for (const m of scene.gate.glyphMeshes) {
      if (m.userData.lit)
        continue;
      const on = m.userData.index === hoverGlyph;
      m.userData.mat.color.setHex(on ? scene.gate.palette.glyphLit : scene.gate.palette.glyph);
      m.userData.mat.opacity = on ? 1 : 0.9;
    }
  }
});
window.addEventListener("pointerdown", (e) => {
  if (debug.isOpen())
    return;
  if (scene.isLogoClick(e.clientX, e.clientY)) {
    debug.toggle();
    return;
  }
  if (scene.dialer.phase === Phase.IDLE) {
    const gi = scene.pickGlyph(e.clientX, e.clientY);
    if (gi >= 0) {
      if (scene.dialer.addGlyph(gi)) {
        const m = scene.gate.glyphMeshes[gi];
        m.userData.mat.color.setHex(scene.gate.palette.glyphLit);
        m.userData.lit = true;
        if (scene.dialer.address.length === 7) {
          for (const idx of scene.dialer.address) {
            const mm = scene.gate.glyphMeshes[idx];
            mm.userData.lit = false;
            mm.userData.mat.color.setHex(scene.gate.palette.glyph);
          }
          scene.dialer.dial();
        }
      }
    }
  }
});
window.addEventListener("keydown", (e) => {
  if (e.key === "Escape")
    scene.dialer.abort();
  if (e.key === "Backspace" && scene.dialer.phase === Phase.IDLE) {
    const last = scene.dialer.address.pop();
    if (last !== undefined) {
      const m = scene.gate.glyphMeshes[last];
      m.userData.lit = false;
      m.userData.mat.color.setHex(scene.gate.palette.glyph);
    }
  }
  if (e.key === "Enter" && scene.dialer.address.length === 7) {
    for (const idx of scene.dialer.address) {
      const mm = scene.gate.glyphMeshes[idx];
      mm.userData.lit = false;
      mm.userData.mat.color.setHex(scene.gate.palette.glyph);
    }
    scene.dialer.dial();
  }
});
var last = performance.now();
var fpsEMA = 60;
function frame(now) {
  const dt = Math.min((now - last) / 1000, 0.05);
  last = now;
  const fps = 1 / Math.max(dt, 0.001);
  fpsEMA = fpsEMA * 0.9 + fps * 0.1;
  if (!scene._frozen)
    scene.update(dt);
  const ph = scene.dialer.phase;
  hud.setActivated(ph === Phase.ACTIVE || ph === Phase.KAWOOSH || ph === Phase.DIALED);
  hud.update(dt, {
    address: scene.dialer.address,
    locked: scene.dialer.lockedCount,
    palette: scene.params.palette,
    binarySpeed: scene.params.binarySpeed,
    resultGlyphPaths: scene.resultGlyphPaths(exports_glyphs),
    phase: scene.dialer.phase,
    mode: scene.dialer.mode,
    remainingMs: scene.dialer.remainingMs(),
    addressName: scene.dialer.addressName
  });
  hud.draw();
  scene.render();
  debug.tickStats(fpsEMA);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").catch(() => {});
  });
}
console.log("%cSGC Dialing Computer online. Click the SGC emblem (top-left) for debug.", "color:#7fd4ff");
